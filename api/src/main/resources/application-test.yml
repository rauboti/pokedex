# Test profile: integration tests get their datasource from a throwaway
# Testcontainers Postgres wired via @ServiceConnection (the harness lands in T008,
# with the security full-context tests), so no datasource/URL is set here. Flyway
# applies the schema migrations against that container; no demo seed — tests insert
# only the rows they need.
spring:
  flyway:
    enabled: true

# Never run the empty-catalog startup sync in tests — the game-data source is stubbed
# at the client interface (MockK) per test, and the suite must not reach the network (T010).
pokedex:
  gamedata:
    sync-on-startup: false
