server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy: the browser hits the same origin as the app and nginx
    # forwards /api to the backend container. This is the production stand-in for
    # the Vite dev proxy (web/vite.config.ts) — same-origin, so no CORS is needed.
    # `pokedex-api` is the compose service name; 8080 its internal port. No trailing slash
    # on proxy_pass, so the /api prefix is preserved (the backend serves under /api).
    location /api/ {
        proxy_pass http://pokedex-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # BFF OAuth endpoints live at the root, not under /api: `/auth/login` starts the
    # Hive flow and `/auth/callback` receives the redirect back. Both are full-page
    # browser navigations, so nginx must forward them to the api too — otherwise they
    # fall through to the SPA below and React Router renders a 404.
    location /auth/ {
        proxy_pass http://pokedex-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Content-hashed build assets (Vite emits new filenames per build), so they're safe to
    # cache forever — a redeploy changes the filename, not the contents at a URL. Matched
    # before `location /`, so these never fall under the no-cache document policy below.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback: client-side routes (React Router) resolve to index.html.
    location / {
        # Baseline security headers on the served document + static assets.
        # `always` so they're sent on error responses too. Scoped to this block —
        # proxied /api/ responses are the backend's to own.
        # NOTE: a Content-Security-Policy is deliberately omitted here — a strict
        # CSP needs the inline anti-FOUC script's hash kept in sync. That hardening
        # is deferred to a dedicated task, not this scaffold.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Fully locked down (pulse's policy): pokedex has no camera/scanner use —
        # avec's `camera=(self)` divergence does not apply here.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # The SPA entry document must always be revalidated (never served stale from the
        # browser's heuristic cache), so a redeploy — new /assets hashes — is picked up on
        # the next load instead of the browser silently running an old bundle.
        add_header Cache-Control "no-cache" always;

        try_files $uri $uri/ /index.html;
    }
}
