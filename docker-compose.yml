services:
  pokedex-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokedex}
      POSTGRES_USER: ${POSTGRES_USER:-pokedex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokedex_local_dev}
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - pokedex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pokedex} -d ${POSTGRES_DB:-pokedex}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  pokedex-api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      pokedex-db:
        condition: service_healthy
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3050}
      # Hive (identity) consumer config. Placeholder-friendly so the container starts; set real
      # values in .env to exercise login/JWT validation. EXTERNAL = browser-reachable (authorize +
      # iss); INTERNAL = container-reachable (token + JWKS). In the shared stack, INTERNAL becomes
      # Hive's service name (e.g. http://hive-api:8080).
      HIVE_EXTERNAL_URL: ${HIVE_EXTERNAL_URL:-http://localhost:5000}
      HIVE_INTERNAL_URL: ${HIVE_INTERNAL_URL:-http://localhost:5000}
      HIVE_CLIENT_ID: ${HIVE_CLIENT_ID:-pokedex}
      HIVE_CLIENT_SECRET: ${HIVE_CLIENT_SECRET:-pokedex-local-dev}
      # Community Game Master source for the species/move catalog sync (research D5) — the api
      # syncs from this base on demand (admin) and at first start with an empty catalog. Point it
      # elsewhere (or at a stub) to test failure modes.
      GAMEDATA_BASE_URL: ${GAMEDATA_BASE_URL:-https://pokemon-go-api.github.io/pokemon-go-api}
      POSTGRES_USER: ${POSTGRES_USER:-pokedex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokedex_local_dev}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://pokedex-db:5432/${POSTGRES_DB:-pokedex}
      # Public web origin (the nginx service, published on 3050). The BFF redirects here after login
      # and derives its OAuth redirect URI from it ({WEB_BASE_URL}/auth/callback). nginx forwards
      # /auth to the api, so the browser only ever talks to this origin.
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3050}
    ports:
      - "5050:8080"
    healthcheck:
      # busybox wget (alpine JRE) — Actuator's liveness probe.
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  pokedex-web:
    build:
      context: ./web
      secrets:
        - rauboti_token
    restart: unless-stopped
    depends_on:
      pokedex-api:
        condition: service_healthy
    ports:
      - "3050:80"

volumes:
  pokedex_pgdata:

secrets:
  # @rauboti/ui registry token, consumed only at web build time (BuildKit secret;
  # never lands in an image layer). Export RAUBOTI_PACKAGE_TOKEN or set it in .env.
  rauboti_token:
    environment: RAUBOTI_PACKAGE_TOKEN
